<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>StreamFree — Free IPTV Player</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.8/dist/hls.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #080808;
    --bg-card: #0f0f0f;
    --bg-sidebar: #0a0a0f;
    --border: #1f1f1f;
    --text: #ffffff;
    --text-secondary: #71717a;
    --accent: #7c3aed;
    --accent-glow: rgba(124, 58, 237, 0.3);
    --cyan: #06b6d4;
    --radius: 12px;
    --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }
  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: #0e0e18; }
  ::-webkit-scrollbar-thumb { background: #2a2a3e; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
  #app { display: flex; flex-direction: column; height: 100vh; background: var(--bg); }

  /* HEADER */
  header { background: linear-gradient(135deg, #0a0a12, #12121e); border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-shrink: 0; z-index: 10; }
  .logo-wrap { display: flex; align-items: center; gap: 10px; cursor: pointer; }
  .logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent), #a855f7); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; box-shadow: 0 0 20px rgba(124, 58, 237, 0.2); }
  .logo-title { font-weight: 700; font-size: 16px; letter-spacing: -0.5px; background: linear-gradient(135deg, #fff 60%, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .logo-sub { font-size: 10px; color: var(--text-secondary); margin-top: 1px; -webkit-text-fill-color: var(--text-secondary); }
  .header-actions { display: flex; align-items: center; gap: 8px; }
  .countdown-badge { font-size: 11px; color: var(--text-secondary); background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 8px; padding: 4px 10px; display: flex; align-items: center; gap: 5px; }
  .countdown-badge span { color: var(--cyan); font-weight: 600; }
  button { background: none; border: none; color: var(--text); cursor: pointer; font-family: inherit; transition: var(--transition); }
  .btn-primary { background: linear-gradient(135deg, var(--accent), #a855f7); border: none; border-radius: 8px; color: #fff; padding: 6px 14px; font-size: 12px; font-weight: 600; cursor: pointer; transition: var(--transition); }
  .btn-primary:hover:not(:disabled) { transform: scale(1.04); box-shadow: 0 0 30px rgba(124, 58, 237, 0.3); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-icon { width: 34px; height: 34px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; background: rgba(255,255,255,0.04); border: 1px solid var(--border); transition: var(--transition); }
  .btn-icon:hover { background: rgba(124, 58, 237, 0.15); border-color: var(--accent); }
  .sidebar-toggle { display: none; }

  /* BODY */
  .body { display: flex; flex: 1; overflow: hidden; }

  /* SIDEBAR */
  aside { width: 300px; min-width: 240px; background: var(--bg-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
  .search-wrap { padding: 10px 14px; border-bottom: 1px solid var(--border); position: relative; }
  .search-icon { position: absolute; left: 24px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); font-size: 13px; pointer-events: none; opacity: 0.5; }
  .search-wrap input { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 8px 10px 8px 32px; font-size: 13px; outline: none; transition: var(--transition); }
  .search-wrap input:focus { border-color: var(--accent); box-shadow: 0 0 20px rgba(124, 58, 237, 0.1); }
  .search-wrap input::placeholder { color: var(--text-secondary); opacity: 0.5; }
  .filters { padding: 8px 14px 10px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; }
  .filters-row { display: flex; gap: 6px; }
  .filters select { flex: 1; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 5px 8px; font-size: 11px; outline: none; cursor: pointer; transition: var(--transition); min-width: 0; }
  .filters select:focus { border-color: var(--accent); }
  .filters select option { background: #1a1a2e; color: var(--text); }
  .result-count { font-size: 10px; color: var(--text-secondary); text-align: right; opacity: 0.6; }
  .channel-list { flex: 1; overflow-y: auto; padding: 4px 0; }
  .ch-row { display: flex; align-items: center; gap: 10px; padding: 8px 14px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.02); border-left: 3px solid transparent; transition: all 0.15s; position: relative; }
  .ch-row:hover { background: rgba(124, 58, 237, 0.06); }
  .ch-row.active { background: rgba(124, 58, 237, 0.08); border-left-color: var(--accent); }
  .ch-row.favorite { background: rgba(6, 182, 212, 0.04); }
  .ch-thumb { width: 32px; height: 32px; flex-shrink: 0; border-radius: 6px; background: rgba(255,255,255,0.03); display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid var(--border); font-size: 14px; }
  .ch-thumb img { width: 100%; height: 100%; object-fit: contain; }
  .ch-info { flex: 1; min-width: 0; }
  .ch-name { font-size: 12.5px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #ddd; }
  .ch-row.active .ch-name { color: #c4b8ff; }
  .ch-meta { font-size: 10px; color: var(--text-secondary); margin-top: 1px; display: flex; align-items: center; gap: 4px; overflow: hidden; opacity: 0.7; }
  .ch-meta img { width: 12px; height: 8px; border-radius: 1px; flex-shrink: 0; }
  .ch-meta span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ch-actions { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
  .fav-btn { font-size: 14px; opacity: 0.2; transition: var(--transition); background: none; border: none; cursor: pointer; padding: 2px; }
  .fav-btn:hover { opacity: 0.6; }
  .fav-btn.active { opacity: 1; color: var(--cyan); }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; background: #222235; transition: var(--transition); }
  .status-dot.live { background: #22c55e; box-shadow: 0 0 8px rgba(34, 197, 94, 0.4); }
  .status-dot.dead { background: #ef4444; box-shadow: 0 0 8px rgba(239, 68, 68, 0.3); }
  .status-dot.unknown { background: #f59e0b; box-shadow: 0 0 8px rgba(245, 158, 11, 0.3); }
  .ch-more { padding: 12px; text-align: center; }
  .ch-more button { background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 6px; color: var(--text-secondary); padding: 6px 16px; font-size: 11px; cursor: pointer; transition: var(--transition); width: 100%; }
  .ch-more button:hover { background: rgba(124, 58, 237, 0.1); border-color: var(--accent); color: var(--text); }
  .loading-state { padding: 30px 20px; text-align: center; }
  .loading-state .icon { font-size: 36px; margin-bottom: 10px; display: block; }
  .loading-state .msg { font-size: 12px; color: var(--text-secondary); margin-bottom: 14px; }
  .progress-bar { height: 3px; background: rgba(255,255,255,0.05); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; width: 40%; background: linear-gradient(90deg, var(--accent), #a855f7); border-radius: 3px; animation: shimmer 1.4s infinite; }
  @keyframes shimmer { 0%{transform:translateX(-200%)} 100%{transform:translateX(400%)} }
  .error-state { padding: 16px; }
  .error-msg { color: #ef4444; font-size: 12px; line-height: 1.6; margin-bottom: 10px; }
  .error-msg code { background: rgba(255,255,255,0.05); padding: 2px 6px; border-radius: 4px; font-size: 11px; color: var(--text-secondary); }
  .btn-retry { background: linear-gradient(135deg, var(--accent), #a855f7); border: none; border-radius: 7px; color: #fff; padding: 8px 16px; font-size: 12px; font-weight: 600; cursor: pointer; width: 100%; transition: var(--transition); }
  .btn-retry:hover { transform: scale(1.02); }

  /* MAIN */
  main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; background: #000; }
  .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; padding: 40px; text-align: center; background: radial-gradient(ellipse at center, #0a0a12, #000); }
  .empty-state .icon { font-size: 56px; }
  .empty-state .title { font-size: 18px; font-weight: 600; color: #fff; }
  .empty-state .sub { font-size: 13px; color: var(--text-secondary); }

  /* PLAYER */
  .player-container { position: relative; width: 100%; background: #000; flex-shrink: 0; }
  .player-wrap { width: 100%; aspect-ratio: 16/9; max-height: 65vh; background: #000; position: relative; }
  video { width: 100%; height: 100%; display: block; background: #000; }
  .player-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.4s; pointer-events: none; background: rgba(0,0,0,0.4); }
  .player-overlay.visible { opacity: 1; pointer-events: auto; }
  .player-overlay .big-play { width: 70px; height: 70px; border-radius: 50%; background: rgba(124, 58, 237, 0.85); border: 2px solid rgba(255,255,255,0.2); color: #fff; font-size: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s; backdrop-filter: blur(10px); box-shadow: 0 0 60px rgba(124, 58, 237, 0.3); }
  .player-overlay .big-play:hover { transform: scale(1.08); background: var(--accent); box-shadow: 0 0 80px rgba(124, 58, 237, 0.5); }

  /* CUSTOM CONTROLS */
  .custom-controls { position: absolute; bottom: 0; left: 0; right: 0; padding: 12px 16px 14px; background: linear-gradient(transparent, rgba(0,0,0,0.85) 60%); opacity: 0; transition: opacity 0.4s; pointer-events: none; }
  .custom-controls.visible { opacity: 1; pointer-events: auto; }
  .controls-top { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
  .controls-top .time { font-size: 11px; color: rgba(255,255,255,0.6); font-variant-numeric: tabular-nums; min-width: 60px; }
  .controls-top .time-current { color: #fff; }
  .progress-wrap { flex: 1; position: relative; height: 4px; background: rgba(255,255,255,0.15); border-radius: 2px; cursor: pointer; transition: height 0.15s; }
  .progress-wrap:hover { height: 6px; }
  .progress-wrap .progress-fill-custom { height: 100%; background: linear-gradient(90deg, var(--accent), #a855f7); border-radius: 2px; width: 0%; transition: width 0.05s linear; position: relative; }
  .progress-wrap .progress-fill-custom::after { content: ''; position: absolute; right: -6px; top: 50%; transform: translateY(-50%); width: 12px; height: 12px; border-radius: 50%; background: var(--accent); opacity: 0; transition: opacity 0.15s; box-shadow: 0 0 20px rgba(124, 58, 237, 0.4); }
  .progress-wrap:hover .progress-fill-custom::after { opacity: 1; }
  .progress-wrap .buffered { position: absolute; inset: 0; background: rgba(255,255,255,0.08); border-radius: 2px; }
  .controls-bottom { display: flex; align-items: center; gap: 8px; }
  .ctrl-btn { background: none; border: none; color: rgba(255,255,255,0.7); font-size: 18px; cursor: pointer; padding: 4px 6px; transition: var(--transition); display: flex; align-items: center; justify-content: center; border-radius: 4px; }
  .ctrl-btn:hover { color: #fff; background: rgba(255,255,255,0.06); }
  .ctrl-btn.play-btn { font-size: 22px; }
  .ctrl-btn.volume-btn { font-size: 16px; }
  .ctrl-btn.fullscreen-btn { font-size: 16px; }
  .volume-wrap { display: flex; align-items: center; gap: 4px; }
  .volume-slider { width: 50px; height: 3px; -webkit-appearance: none; appearance: none; background: rgba(255,255,255,0.15); border-radius: 2px; outline: none; transition: width 0.2s; cursor: pointer; }
  .volume-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 10px; height: 10px; border-radius: 50%; background: var(--accent); cursor: pointer; box-shadow: 0 0 20px rgba(124, 58, 237, 0.3); }
  .volume-slider::-moz-range-thumb { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); cursor: pointer; border: none; }
  .skip-btn { font-size: 14px; padding: 4px 5px; }

  /* CHANNEL INFO */
  .channel-info { padding: 10px 18px; border-bottom: 1px solid var(--border); background: #0a0a0f; flex-shrink: 0; }
  .channel-info-inner { display: flex; align-items: center; gap: 12px; }
  .info-thumb { width: 42px; height: 42px; border-radius: 8px; background: rgba(255,255,255,0.03); display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid var(--border); flex-shrink: 0; font-size: 20px; }
  .info-thumb img { width: 100%; height: 100%; object-fit: contain; }
  .info-text { min-width: 0; flex: 1; }
  .info-name { font-weight: 600; font-size: 15px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .info-tags { display: flex; gap: 5px; margin-top: 3px; flex-wrap: wrap; }
  .tag { border-radius: 4px; padding: 2px 8px; font-size: 10px; display: inline-flex; align-items: center; gap: 3px; font-weight: 500; }
  .tag.group { background: rgba(124, 58, 237, 0.15); color: #a78bfa; }
  .tag.country { background: rgba(34, 197, 94, 0.12); color: #4ade80; }
  .tag.lang { background: rgba(255,255,255,0.04); color: var(--text-secondary); }
  .tag img { width: 12px; height: 8px; }
  .info-fav-btn { font-size: 18px; opacity: 0.2; transition: var(--transition); cursor: pointer; background: none; border: none; padding: 4px; }
  .info-fav-btn:hover { opacity: 0.6; }
  .info-fav-btn.active { opacity: 1; color: var(--cyan); }

  /* RELATED */
  .related { flex: 1; overflow-y: auto; padding: 12px 16px 20px; background: #0a0a0f; }
  .related-title { font-size: 10px; color: var(--text-secondary); font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; opacity: 0.6; }
  .related-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 6px; }
  .rel-card { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 8px; padding: 7px 10px; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all 0.15s; }
  .rel-card:hover { border-color: var(--accent); background: rgba(124, 58, 237, 0.05); transform: translateY(-1px); }
  .rel-thumb { width: 24px; height: 24px; border-radius: 4px; background: rgba(255,255,255,0.03); display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; font-size: 12px; }
  .rel-thumb img { width: 100%; height: 100%; object-fit: contain; }
  .rel-name { font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #bbb; }
  .rel-card .fav-star { font-size: 10px; opacity: 0.2; margin-left: auto; flex-shrink: 0; }
  .rel-card .fav-star.active { opacity: 1; color: var(--cyan); }

  /* TOAST */
  .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(80px); background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); border: 1px solid var(--border); color: #fff; padding: 10px 20px; border-radius: 10px; font-size: 13px; opacity: 0; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 9999; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* MOBILE */
  @media (max-width: 768px) {
    .sidebar-toggle { display: flex; }
    aside { position: fixed; top: 0; left: 0; bottom: 0; width: 85%; max-width: 320px; z-index: 100; transform: translateX(-105%); box-shadow: 0 0 60px rgba(0,0,0,0.8); }
    aside.open { transform: translateX(0); }
    .sidebar-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 99; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
    .sidebar-backdrop.open { opacity: 1; pointer-events: auto; }
    .player-wrap { max-height: 45vh; }
    .related-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
    .volume-slider { width: 30px; }
    .controls-top .time { font-size: 10px; min-width: 40px; }
    .channel-info { padding: 8px 12px; }
    .info-name { font-size: 13px; }
  }

  /* LOADING SKELETON */
  .skeleton { background: linear-gradient(90deg, rgba(255,255,255,0.02) 25%, rgba(255,255,255,0.05) 50%, rgba(255,255,255,0.02) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 4px; }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
</style>
</head>
<body>

<div id="app">
  <header>
    <div class="logo-wrap" onclick="closeSidebar()">
      <div class="logo-icon"></div>
      <div>
        <div class="logo-title">StreamFree</div>
        <div class="logo-sub" id="logo-sub">Starting...</div>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn-icon sidebar-toggle" onclick="toggleSidebar()" aria-label="Toggle sidebar"></button>
      <div class="countdown-badge" id="countdown-badge" style="display:none"><span id="countdown">--</span>s</div>
      <button class="btn-primary" id="refresh-btn" onclick="loadChannels(true)" disabled> Refresh</button>
    </div>
  </header>

  <div class="body">
    <div class="sidebar-backdrop" id="sidebar-backdrop" onclick="closeSidebar()"></div>
    <aside id="sidebar">
      <div class="search-wrap">
        <span class="search-icon"></span>
        <input type="text" id="search" placeholder="Search channels..." oninput="applyFilters()" />
      </div>
      <div class="filters">
        <div class="filters-row">
          <select id="group-filter" onchange="applyFilters()"><option value="">All Categories</option></select>
          <select id="country-filter" onchange="applyFilters()"><option value="">All Countries</option></select>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <button onclick="toggleFavoritesFilter()" id="fav-filter-btn" style="font-size:10px;color:var(--text-secondary);background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:4px;padding:2px 8px;cursor:pointer;transition:var(--transition);"> Show All</button>
          <div class="result-count" id="result-count">0 results</div>
        </div>
      </div>
      <div class="channel-list" id="channel-list">
        <div class="loading-state">
          <span class="icon"></span>
          <div class="msg">Connecting to server...</div>
          <div class="progress-bar"><div class="progress-fill"></div></div>
        </div>
      </div>
    </aside>

    <main id="main">
      <div class="empty-state">
        <div class="icon"></div>
        <div class="title">Pick a channel to watch</div>
        <div class="sub" id="empty-sub">Loading channels...</div>
      </div>
    </main>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
//  CONFIG 
const API = window.location.origin;
const FLAG_BASE = "https://purecatamphetamine.github.io/country-flag-icons/3x2";
const FAV_KEY = "streamfree_favorites";
const CHECK_CACHE = new Map();
const CHECK_CACHE_TTL = 120000; // 2 min

let allChannels = [], filtered = [], activeChannel = null;
let hls = null, currentVideo = null;
let nextRefresh = null, showingFavorites = false;
let displayLimit = 100;
let controlsTimeout = null;
let isControlsVisible = false;
let isPlaying = false;

//  FAVORITES 
function getFavorites() {
  try { return JSON.parse(localStorage.getItem(FAV_KEY) || "[]"); } catch { return []; }
}
function setFavorites(favs) { localStorage.setItem(FAV_KEY, JSON.stringify(favs)); }
function toggleFavorite(id) {
  const favs = getFavorites();
  const idx = favs.indexOf(id);
  if (idx > -1) favs.splice(idx, 1);
  else favs.push(id);
  setFavorites(favs);
  renderList();
  updatePlayerFavButton();
  showToast(idx > -1 ? "Removed from favorites" : "Added to favorites ");
}
function isFavorite(id) { return getFavorites().includes(id); }
function toggleFavoritesFilter() {
  showingFavorites = !showingFavorites;
  document.getElementById("fav-filter-btn").textContent = showingFavorites ? " Favorites" : " Show All";
  applyFilters();
}

//  TOAST 
function showToast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(el._hide);
  el._hide = setTimeout(() => el.classList.remove("show"), 2000);
}

//  SIDEBAR 
function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("open");
  document.getElementById("sidebar-backdrop").classList.toggle("open");
}
function closeSidebar() {
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("sidebar-backdrop").classList.remove("open");
}

//  FLAG 
function getFlag(code) {
  if (!code || code.length !== 2) return null;
  return `${FLAG_BASE}/${code.toUpperCase()}.svg`;
}

//  LOAD CHANNELS 
async function loadChannels(force = false) {
  const btn = document.getElementById("refresh-btn");
  const sub = document.getElementById("logo-sub");
  const list = document.getElementById("channel-list");

  btn.disabled = true;
  btn.textContent = " Loading";
  sub.textContent = "Fetching playlist...";
  list.innerHTML = `<div class="loading-state"><span class="icon"></span><div class="msg">Fetching playlist...</div><div class="progress-bar"><div class="progress-fill"></div></div></div>`;

  try {
    const res = await fetch(`${API}/api/channels${force ? "?refresh=true" : ""}`);
    if (!res.ok) throw new Error(`Server returned ${res.status}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    allChannels = data.channels.map((ch, i) => ({ ...ch, id: `ch-${i}` }));
    sub.textContent = `${allChannels.length.toLocaleString()} channels · ${new Date(data.cached_at).toLocaleTimeString()}`;

    nextRefresh = Date.now() + 30 * 60 * 1000;
    document.getElementById("countdown-badge").style.display = "flex";
    startCountdown();
    populateFilters();
    applyFilters();

    btn.disabled = false;
    btn.textContent = " Refresh";
    const es = document.getElementById("empty-sub");
    if (es) es.textContent = `${allChannels.length.toLocaleString()} free channels ready`;

    // Pre-check first 20 channels for status
    checkChannelStatuses(allChannels.slice(0, 20));

  } catch (e) {
    console.error(e);
    list.innerHTML = `<div class="error-state"><div class="error-msg"> ${e.message}</div><button class="btn-retry" onclick="loadChannels()"> Try Again</button></div>`;
    sub.textContent = "Connection failed";
    btn.disabled = false;
    btn.textContent = " Retry";
  }
}

//  STATUS CHECK 
async function checkChannelStatuses(channels) {
  for (const ch of channels) {
    if (!ch.url) continue;
    const cached = CHECK_CACHE.get(ch.url);
    if (cached && Date.now() - cached.timestamp < CHECK_CACHE_TTL) {
      ch._status = cached.status;
      continue;
    }
    try {
      const res = await fetch(`${API}/api/check?url=${encodeURIComponent(ch.url)}`);
      const data = await res.json();
      ch._status = data.alive ? "live" : "dead";
      CHECK_CACHE.set(ch.url, { status: ch._status, timestamp: Date.now() });
    } catch {
      ch._status = "unknown";
    }
    // Update UI if this channel is visible
    renderList();
  }
}

function getStatusDot(status) {
  if (status === "live") return "live";
  if (status === "dead") return "dead";
  return "unknown";
}

//  POPULATE FILTERS 
function populateFilters() {
  const groups = Array.from(new Set(allChannels.map(c => c.group).filter(Boolean))).sort();
  const countries = Array.from(new Set(allChannels.map(c => c.country).filter(Boolean))).sort();
  document.getElementById("group-filter").innerHTML = `<option value="">All Categories</option>` + groups.map(g => `<option value="${escAttr(g)}">${escHtml(g)}</option>`).join("");
  document.getElementById("country-filter").innerHTML = `<option value="">All Countries</option>` + countries.map(c => `<option value="${escAttr(c)}">${escHtml(c)}</option>`).join("");
}

//  APPLY FILTERS 
function applyFilters() {
  const q = document.getElementById("search").value.toLowerCase().trim();
  const g = document.getElementById("group-filter").value;
  const c = document.getElementById("country-filter").value;
  const favs = getFavorites();

  filtered = allChannels.filter(ch => {
    if (g && ch.group !== g) return false;
    if (c && ch.country !== c) return false;
    if (showingFavorites && !favs.includes(ch.id)) return false;
    if (q && !ch.name.toLowerCase().includes(q) && !(ch.group||"").toLowerCase().includes(q) && !(ch.country||"").toLowerCase().includes(q)) return false;
    return true;
  });
  document.getElementById("result-count").textContent = `${filtered.length.toLocaleString()} results`;
  displayLimit = 100;
  renderList();
}

//  RENDER LIST 
function renderList() {
  const list = document.getElementById("channel-list");
  const shown = filtered.slice(0, displayLimit);
  const favs = getFavorites();

  if (!shown.length) {
    list.innerHTML = `<div style="padding:30px 16px;text-align:center;color:var(--text-secondary);font-size:13px;opacity:0.5;">${showingFavorites ? 'No favorites yet ' : 'No channels found'}</div>`;
    return;
  }

  list.innerHTML = shown.map(ch => {
    const flag = ch.country && ch.country.length === 2 ? `<img src="${FLAG_BASE}/${ch.country.toUpperCase()}.svg" onerror="this.style.display='none'" />` : "";
    const logo = ch.logo ? `<img src="${escAttr(ch.logo)}" onerror="this.style.display='none'" />` : "";
    const isActive = activeChannel?.id === ch.id;
    const isFav = favs.includes(ch.id);
    const dot = getStatusDot(ch._status);
    return `<div class="ch-row${isActive ? " active" : ""}${isFav ? " favorite" : ""}" onclick="playChannel('${ch.id}')">
      <div class="ch-thumb">${logo}</div>
      <div class="ch-info">
        <div class="ch-name">${escHtml(ch.name)}</div>
        <div class="ch-meta">${flag}<span>${escHtml(ch.group || 'General')}</span></div>
      </div>
      <div class="ch-actions">
        <button class="fav-btn${isFav ? " active" : ""}" onclick="event.stopPropagation();toggleFavorite('${ch.id}')">${isFav ? '' : ''}</button>
        <div class="status-dot ${dot}"></div>
      </div>
    </div>`;
  }).join("");

  if (filtered.length > displayLimit) {
    list.innerHTML += `<div class="ch-more"><button onclick="displayLimit += 100; renderList();">Load more (${filtered.length - displayLimit} remaining)</button></div>`;
  }
}

//  PLAY CHANNEL 
function playChannel(id) {
  activeChannel = allChannels.find(ch => ch.id === id);
  if (!activeChannel) return;
  closeSidebar();
  renderList();
  renderPlayer();
  // Check status when playing
  if (!activeChannel._status) {
    checkChannelStatuses([activeChannel]);
  }
}

//  RENDER PLAYER 
function renderPlayer() {
  const ch = activeChannel;
  if (!ch) return;
  const favs = getFavorites();
  const isFav = favs.includes(ch.id);
  const flag = ch.country && ch.country.length === 2 ? `<img src="${FLAG_BASE}/${ch.country.toUpperCase()}.svg" onerror="this.style.display='none'" />` : "";
  const logo = ch.logo ? `<img src="${escAttr(ch.logo)}" style="width:100%;height:100%;object-fit:contain" onerror="this.style.display='none'" />` : "";

  // Related: same group + same country + top 20
  const related = allChannels
    .filter(c => c.id !== ch.id && (c.group === ch.group || c.country === ch.country))
    .slice(0, 20);

  const relCards = related.map(r => {
    const rLogo = r.logo ? `<img src="${escAttr(r.logo)}" onerror="this.style.display='none'" style="width:100%;height:100%;object-fit:contain" />` : "";
    const rFav = favs.includes(r.id);
    return `<div class="rel-card" onclick="playChannel('${r.id}')">
      <div class="rel-thumb">${rLogo}</div>
      <div class="rel-name">${escHtml(r.name)}</div>
      <span class="fav-star${rFav ? ' active' : ''}">${rFav ? '' : ''}</span>
    </div>`;
  }).join("");

  document.getElementById("main").innerHTML = `
    <div class="player-container">
      <div class="player-wrap" id="player-wrap">
        <video id="video" playsinline preload="metadata"></video>
        <div class="player-overlay" id="player-overlay">
          <button class="big-play" id="big-play-btn"></button>
        </div>
        <div class="custom-controls" id="custom-controls">
          <div class="controls-top">
            <span class="time time-current" id="current-time">0:00</span>
            <div class="progress-wrap" id="progress-wrap">
              <div class="buffered" id="buffered-bar"></div>
              <div class="progress-fill-custom" id="progress-fill"></div>
            </div>
            <span class="time" id="duration-time">0:00</span>
          </div>
          <div class="controls-bottom">
            <button class="ctrl-btn play-btn" id="ctrl-play"></button>
            <button class="ctrl-btn skip-btn" id="ctrl-skip-back" title="Skip back 10s"></button>
            <button class="ctrl-btn skip-btn" id="ctrl-skip-forward" title="Skip forward 10s"></button>
            <div class="volume-wrap">
              <button class="ctrl-btn volume-btn" id="ctrl-volume"></button>
              <input type="range" class="volume-slider" id="ctrl-volume-slider" min="0" max="1" step="0.05" value="1" />
            </div>
            <div style="flex:1"></div>
            <button class="ctrl-btn fullscreen-btn" id="ctrl-fullscreen"></button>
          </div>
        </div>
      </div>
    </div>
    <div class="channel-info">
      <div class="channel-info-inner">
        <div class="info-thumb">${logo}</div>
        <div class="info-text">
          <div class="info-name">${escHtml(ch.name)}</div>
          <div class="info-tags">
            ${ch.group ? `<span class="tag group">${escHtml(ch.group)}</span>` : ""}
            ${ch.country ? `<span class="tag country">${flag} ${escHtml(ch.country)}</span>` : ""}
            ${ch.language ? `<span class="tag lang">${escHtml(ch.language)}</span>` : ""}
            <span class="tag" style="background:rgba(34,197,94,0.08);color:#4ade80;"> ${ch._status === 'live' ? 'Live' : ch._status === 'dead' ? 'Offline' : 'Checking...'}</span>
          </div>
        </div>
        <button class="info-fav-btn${isFav ? ' active' : ''}" onclick="toggleFavorite('${ch.id}'); updatePlayerFavButton();">${isFav ? '' : ''}</button>
      </div>
    </div>
    <div class="related">
      <div class="related-title">Related Channels</div>
      <div class="related-grid">${relCards || '<div style="color:var(--text-secondary);font-size:12px;opacity:0.5;">No related channels</div>'}</div>
    </div>
  `;

  setupVideoPlayer(ch.url);
  setupControls();
}

function updatePlayerFavButton() {
  if (!activeChannel) return;
  const isFav = isFavorite(activeChannel.id);
  const btn = document.querySelector('.info-fav-btn');
  if (btn) {
    btn.textContent = isFav ? '' : '';
    btn.classList.toggle('active', isFav);
  }
  renderList();
}

//  VIDEO PLAYER 
function setupVideoPlayer(streamUrl) {
  const video = document.getElementById("video");
  if (!video) return;
  currentVideo = video;
  if (hls) { hls.destroy(); hls = null; }

  // Reset state
  isPlaying = false;
  video.removeAttribute('src');
  video.load();

  if (typeof Hls !== "undefined" && Hls.isSupported()) {
    hls = new Hls({
      enableWorker: false,
      maxBufferLength: 30,
      maxMaxBufferLength: 30,
      liveDurationInfinity: true,
    });
    hls.loadSource(streamUrl);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      video.play().then(() => {
        isPlaying = true;
        updatePlayButton();
      }).catch(() => {
        // Auto-play blocked by browser
        showOverlay();
      });
    });
    hls.on(Hls.Events.ERROR, (_, data) => {
      if (data.fatal) {
        console.warn("HLS fatal error, trying to recover...");
        hls.destroy();
        hls = null;
        // Try native playback as fallback
        video.src = streamUrl;
        video.play().catch(() => {});
      }
    });
  } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
    video.src = streamUrl;
    video.play().then(() => {
      isPlaying = true;
      updatePlayButton();
    }).catch(() => showOverlay());
  } else {
    // Try direct
    video.src = streamUrl;
    video.play().catch(() => showOverlay());
  }

  // Video events for controls
  video.addEventListener('timeupdate', updateProgress);
  video.addEventListener('loadedmetadata', updateDuration);
  video.addEventListener('play', () => { isPlaying = true; updatePlayButton(); hideOverlay(); });
  video.addEventListener('pause', () => { isPlaying = false; updatePlayButton(); });
  video.addEventListener('ended', () => { isPlaying = false; updatePlayButton(); showOverlay(); });
  video.addEventListener('waiting', () => { /* show buffering */ });
  video.addEventListener('canplay', () => { /* hide buffering */ });
}

function setupControls() {
  const video = document.getElementById("video");
  if (!video) return;

  const controls = document.getElementById("custom-controls");
  const overlay = document.getElementById("player-overlay");
  const wrap = document.getElementById("player-wrap");

  // Show/hide controls
  let controlsVisible = true;
  let controlsTimer = null;

  function showControls() {
    controls.classList.add("visible");
    controlsVisible = true;
    clearTimeout(controlsTimer);
    controlsTimer = setTimeout(() => {
      if (isPlaying) {
        controls.classList.remove("visible");
        controlsVisible = false;
      }
    }, 3000);
  }

  function toggleControls() {
    if (controlsVisible) {
      controls.classList.remove("visible");
      controlsVisible = false;
      clearTimeout(controlsTimer);
    } else {
      showControls();
    }
  }

  wrap.addEventListener('mousemove', showControls);
  wrap.addEventListener('touchstart', toggleControls);
  wrap.addEventListener('click', (e) => {
    if (e.target === wrap || e.target === video || e.target.closest('.player-wrap')) {
      togglePlay();
    }
  });

  // Play/Pause
  document.getElementById("ctrl-play")?.addEventListener('click', (e) => {
    e.stopPropagation();
    togglePlay();
  });
  document.getElementById("big-play-btn")?.addEventListener('click', (e) => {
    e.stopPropagation();
    togglePlay();
  });

  // Skip
  document.getElementById("ctrl-skip-back")?.addEventListener('click', (e) => {
    e.stopPropagation();
    video.currentTime = Math.max(0, video.currentTime - 10);
    showControls();
  });
  document.getElementById("ctrl-skip-forward")?.addEventListener('click', (e) => {
    e.stopPropagation();
    video.currentTime = Math.min(video.duration || Infinity, video.currentTime + 10);
    showControls();
  });

  // Progress bar
  const progressWrap = document.getElementById("progress-wrap");
  progressWrap?.addEventListener('click', (e) => {
    const rect = progressWrap.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    video.currentTime = pct * (video.duration || 0);
    showControls();
  });

  // Volume
  const volSlider = document.getElementById("ctrl-volume-slider");
  const volBtn = document.getElementById("ctrl-volume");
  volSlider?.addEventListener('input', () => {
    video.volume = parseFloat(volSlider.value);
    video.muted = false;
    updateVolumeIcon();
  });
  volBtn?.addEventListener('click', () => {
    video.muted = !video.muted;
    updateVolumeIcon();
  });

  // Fullscreen
  document.getElementById("ctrl-fullscreen")?.addEventListener('click', () => {
    if (!document.fullscreenElement) {
      document.getElementById("player-wrap")?.requestFullscreen?.() || document.documentElement.requestFullscreen?.();
    } else {
      document.exitFullscreen?.();
    }
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
    const vid = document.getElementById("video");
    if (!vid) return;
    switch(e.key) {
      case ' ':
      case 'Space':
        e.preventDefault();
        togglePlay();
        break;
      case 'ArrowLeft':
        e.preventDefault();
        vid.currentTime = Math.max(0, vid.currentTime - 10);
        showControls();
        break;
      case 'ArrowRight':
        e.preventDefault();
        vid.currentTime = Math.min(vid.duration || Infinity, vid.currentTime + 10);
        showControls();
        break;
      case 'f':
      case 'F':
        document.getElementById("ctrl-fullscreen")?.click();
        break;
      case 'Escape':
        if (document.fullscreenElement) document.exitFullscreen?.();
        break;
      case 'm':
      case 'M':
        vid.muted = !vid.muted;
        updateVolumeIcon();
        break;
    }
  });

  // Init
  showControls();
  updateVolumeIcon();

  // Also show overlay when paused
  function updateOverlay() {
    if (video.paused && video.currentTime > 0) {
      showOverlay();
    } else {
      hideOverlay();
    }
  }
  video.addEventListener('pause', updateOverlay);
  video.addEventListener('play', hideOverlay);
}

function togglePlay() {
  const video = document.getElementById("video");
  if (!video) return;
  if (video.paused) {
    video.play().catch(() => {});
  } else {
    video.pause();
  }
}

function updatePlayButton() {
  const btn = document.getElementById("ctrl-play");
  const big = document.getElementById("big-play-btn");
  if (btn) btn.textContent = isPlaying ? '' : '';
  if (big) big.textContent = isPlaying ? '' : '';
}

function showOverlay() {
  document.getElementById("player-overlay")?.classList.add("visible");
}

function hideOverlay() {
  document.getElementById("player-overlay")?.classList.remove("visible");
}

function updateProgress() {
  const video = document.getElementById("video");
  if (!video) return;
  const pct = video.duration ? (video.currentTime / video.duration) * 100 : 0;
  document.getElementById("progress-fill").style.width = pct + '%';
  document.getElementById("current-time").textContent = formatTime(video.currentTime);
  // Buffered
  if (video.buffered.length) {
    const bufferedEnd = video.buffered.end(video.buffered.length - 1);
    const bufferedPct = video.duration ? (bufferedEnd / video.duration) * 100 : 0;
    document.getElementById("buffered-bar").style.width = bufferedPct + '%';
  }
}

function updateDuration() {
  const video = document.getElementById("video");
  if (video) document.getElementById("duration-time").textContent = formatTime(video.duration || 0);
}

function formatTime(sec) {
  if (!sec || isNaN(sec)) return '0:00';
  sec = Math.floor(sec);
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${m}:${s.toString().padStart(2, '0')}`;
}

function updateVolumeIcon() {
  const video = document.getElementById("video");
  const btn = document.getElementById("ctrl-volume");
  if (!video || !btn) return;
  if (video.muted || video.volume === 0) btn.textContent = '';
  else if (video.volume < 0.5) btn.textContent = '';
  else btn.textContent = '';
  if (video.muted) document.getElementById("ctrl-volume-slider").value = 0;
  else document.getElementById("ctrl-volume-slider").value = video.volume;
}

//  COUNTDOWN 
function startCountdown() {
  clearInterval(window._cdTimer);
  window._cdTimer = setInterval(() => {
    if (!nextRefresh) return;
    const diff = nextRefresh - Date.now();
    if (diff <= 0) {
      document.getElementById("countdown").textContent = "0s";
      loadChannels();
      return;
    }
    const s = Math.floor(diff / 1000);
    document.getElementById("countdown").textContent = `${s}s`;
  }, 1000);
}

//  HELPERS 
function escHtml(s) { return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function escAttr(s) { return (s||"").replace(/"/g,"&quot;"); }

//  START 
loadChannels();

// Handle window resize for fullscreen
document.addEventListener('fullscreenchange', () => {
  const btn = document.getElementById("ctrl-fullscreen");
  if (btn) btn.textContent = document.fullscreenElement ? '' : '';
});
</script>
